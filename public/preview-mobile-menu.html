<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview Mobile Menu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0D0D0D; }

  /* Simulated mobile frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    margin: 20px auto;
    border-radius: 40px;
    border: 3px solid #333;
    overflow: hidden;
    position: relative;
    background: rgba(13,13,13,0.97);
    backdrop-filter: blur(20px);
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
  }
  .logo { font-size: 24px; font-weight: 700; color: #fff; }
  .close-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; border: none; background: none;
    color: #888; cursor: pointer;
    transition: all 0.2s;
  }
  .close-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }

  /* Nav links */
  .nav-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 32px;
    margin-top: -48px;
  }
  .nav-links { display: flex; flex-direction: column; gap: 8px; }
  .nav-link {
    display: flex; align-items: center; gap: 16px;
    padding: 16px;
    border-radius: 12px;
    font-size: 24px; font-weight: 600;
    color: rgba(255,255,255,0.9);
    text-decoration: none;
    transition: all 0.2s;
  }
  .nav-link:hover { background: rgba(255,255,255,0.06); color: #E86C47; }
  .nav-link .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #E86C47; opacity: 0;
    transition: opacity 0.2s;
  }
  .nav-link:hover .dot { opacity: 1; }

  /* Divider */
  .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 24px 16px; }

  /* Vitrines badge */
  .vitrines-link {
    display: flex; align-items: center; gap: 12px;
    margin: 0 16px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid rgba(232,108,71,0.2);
    font-size: 14px; font-weight: 600;
    color: #E86C47;
    text-decoration: none;
    transition: all 0.2s;
  }
  .vitrines-link:hover { background: rgba(255,255,255,0.06); }
  .ping-dot {
    position: relative; width: 10px; height: 10px;
  }
  .ping-dot::before {
    content: ''; position: absolute; inset: 0;
    border-radius: 50%; background: #E86C47;
    animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
  }
  .ping-dot::after {
    content: ''; position: absolute; inset: 0;
    border-radius: 50%; background: #E86C47;
  }
  @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
  .vitrines-link .ext-icon { margin-left: auto; opacity: 0.5; }

  /* Bottom section */
  .bottom-section {
    padding: 0 32px 40px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* CTA */
  .cta-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 16px 24px;
    border-radius: 12px;
    background: #E86C47;
    color: #fff;
    font-size: 16px; font-weight: 600;
    text-decoration: none;
    box-shadow: 0 8px 24px rgba(232,108,71,0.2);
    transition: all 0.2s;
  }
  .cta-btn:hover { background: #d55d3b; transform: scale(0.98); }

  /* Language + footer */
  .bottom-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .lang-switcher {
    display: flex; align-items: center; gap: 6px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    padding: 4px 6px;
    font-size: 14px; font-weight: 600;
  }
  .lang-switcher a {
    padding: 4px 12px;
    border-radius: 16px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .lang-switcher a.active { background: #E86C47; color: #fff; }
  .lang-switcher a.inactive { color: #666; }
  .footer-text { font-size: 12px; color: #444; }

  /* Side-by-side comparison */
  .comparison {
    display: flex; gap: 40px; justify-content: center; align-items: flex-start;
    padding: 40px 20px;
  }
  .label { text-align: center; color: #666; font-size: 14px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="comparison">
  <div>
    <div class="label">Nouveau menu mobile</div>
    <div class="phone-frame" style="display:flex;flex-direction:column;">
      <!-- Top bar -->
      <div class="top-bar">
        <span class="logo">Marc M</span>
        <button class="close-btn">
          <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Navigation -->
      <div class="nav-section">
        <nav class="nav-links">
          <a href="#" class="nav-link"><span class="dot"></span>Réalisations</a>
          <a href="#" class="nav-link"><span class="dot"></span>Offre</a>
          <a href="#" class="nav-link"><span class="dot"></span>Journal</a>
          <a href="#" class="nav-link"><span class="dot"></span>Qui suis-je</a>
        </nav>

        <div class="divider"></div>

        <a href="#" class="vitrines-link">
          <span class="ping-dot"></span>
          100 Vitrines — Sites gratuits pour artisans
          <svg class="ext-icon" width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        </a>
      </div>

      <!-- Bottom -->
      <div class="bottom-section">
        <a href="#" class="cta-btn">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Contact
        </a>
        <div class="bottom-row">
          <div class="lang-switcher">
            <a href="#" class="active">FR</a>
            <a href="#" class="inactive">EN</a>
          </div>
          <span class="footer-text">marcm.fr</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
